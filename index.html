<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Landing Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            background: #111;
            color: white;
        }

        .hero{
            height:100vh;
            background:
                linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920');
            background-size: cover;
            background-position: center;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .content{
            max-width:700px;
            padding:40px;
            border-radius:25px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .content h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .content p{
            font-size:18px;
            line-height:1.8;
            margin-bottom:30px;
            color:#ddd;
        }

        .btn{
            display:inline-block;
            padding:15px 35px;
            background: linear-gradient(45deg,#ff6b6b,#6c63ff);
            color:white;
            text-decoration:none;
            border-radius:50px;
            font-size:18px;
            transition:0.3s;
        }

        .btn:hover{
            transform: translateY(-5px);
            box-shadow:0 10px 25px rgba(255,255,255,0.3);
        }

        @media(max-width:768px){
            .content h1{
                font-size:40px;
            }

            .content p{
                font-size:16px;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="content">
            <h1>Welcome to Future</h1>
            <p>
                Create beautiful websites with modern design,
                glassmorphism effects and stunning backgrounds.
            </p>

            <a href="#" class="btn">Explore Now</a>
        </div>
    </section>

</body>
</html>
